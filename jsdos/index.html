<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GAME12 - Unnamed - 8K Version - X86 Assembly - P1X</title>
    <link rel="stylesheet" href="js-dos.css" />
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        background: #121212;
        display: flex;
        justify-content: center;
        align-items: center;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica,
          Arial, sans-serif;
        overflow: hidden;
        color: #e0e0e0;
      }

      .crt-container {
        position: relative;
        width: 100%;
        height: 100%;
        max-width: 1200px;
        max-height: 900px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 20px;
        box-sizing: border-box;
      }

      .crt-monitor {
        position: relative;
        width: 100%;
        height: 100%;
        background: #000;
        border: 1px solid #333;
        border-radius: 4px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        overflow: hidden;
        display: flex;
        justify-content: center;
        align-items: center;
        cursor: none;
      }

      .crt-screen {
        position: relative;
        width: 100%;
        height: 100%;
        background: #000;
        overflow: hidden;
      }

      /* Subtle scanline effect overlay */
      .crt-screen::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(
          to bottom,
          rgba(255, 255, 255, 0) 50%,
          rgba(0, 0, 0, 0.1) 50%
        );
        background-size: 100% 4px;
        pointer-events: none;
        z-index: 10;
        opacity: 0.2;
      }

      /* Subtle vignette effect */
      .crt-screen::after {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: radial-gradient(
          ellipse at center,
          rgba(0, 0, 0, 0) 0%,
          rgba(0, 0, 0, 0.2) 100%
        );
        pointer-events: none;
        z-index: 20;
      }

      #dos {
        width: 100%;
        height: 100%;
        position: relative;
        z-index: 1;
      }

      .controls {
        margin-top: 15px;
        display: flex;
        gap: 15px;
        z-index: 30;
      }

      .control-btn {
        padding: 8px 16px;
        background: #2a2a2a;
        border: 1px solid #444;
        color: #ccc;
        font-family: inherit;
        font-size: 12px;
        cursor: pointer;
        border-radius: 3px;
        transition: all 0.2s ease;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        outline: none;
      }

      .control-btn:hover {
        background: #333;
        border-color: #666;
        color: #fff;
      }

      .control-btn:active {
        transform: translateY(1px);
        background: #222;
      }

      /* Fullscreen styles */
      body:fullscreen {
        background: #000;
      }

      body:-webkit-full-screen {
        background: #000;
      }

      body:-moz-full-screen {
        background: #000;
      }

      body:-ms-fullscreen {
        background: #000;
      }

      /* Hide controls and remove frame in fullscreen */
      body:fullscreen .controls,
      body:-webkit-full-screen .controls,
      body:-moz-full-screen .controls,
      body:-ms-fullscreen .controls {
        display: none;
      }

      body:fullscreen .crt-container,
      body:-webkit-full-screen .crt-container,
      body:-moz-full-screen .crt-container,
      body:-ms-fullscreen .crt-container {
        padding: 0;
        max-width: 100%;
        max-height: 100%;
      }

      body:fullscreen .crt-monitor,
      body:-webkit-full-screen .crt-monitor,
      body:-moz-full-screen .crt-monitor,
      body:-ms-fullscreen .crt-monitor {
        border: none;
        border-radius: 0;
        box-shadow: none;
      }

      /* Remove CRT effects in fullscreen for clean view */
      body:fullscreen .crt-screen::before,
      body:-webkit-full-screen .crt-screen::before,
      body:-moz-full-screen .crt-screen::before,
      body:-ms-fullscreen .crt-screen::before,
      body:fullscreen .crt-screen::after,
      body:-webkit-full-screen .crt-screen::after,
      body:-moz-full-screen .crt-screen::after,
      body:-ms-fullscreen .crt-screen::after {
        display: none;
      }
    </style>
    <script src="js-dos.js"></script>
  </head>
  <body>
    <div class="crt-container">
      <div class="crt-monitor">
        <div class="crt-screen">
          <div id="dos"></div>
        </div>
      </div>
      <div class="controls">
        <button class="control-btn" id="fullscreen-btn">Fullscreen</button>
      </div>
    </div>

    <script>
      // Initialize JS-DOS
      Dos(document.getElementById("dos"), {
        url: "game12.jsdos",
        kiosk: true,
        theme: "dark",
        backend: "dosbox",
        backendLocked: true,
        autoStart: true,
      });

      // Fullscreen functionality
      const fullscreenBtn = document.getElementById("fullscreen-btn");

      fullscreenBtn.addEventListener("click", function () {
        if (
          !document.fullscreenElement &&
          !document.webkitFullscreenElement &&
          !document.mozFullScreenElement &&
          !document.msFullscreenElement
        ) {
          // Enter fullscreen
          const elem = document.documentElement;
          if (elem.requestFullscreen) {
            elem.requestFullscreen();
          } else if (elem.webkitRequestFullscreen) {
            elem.webkitRequestFullscreen();
          } else if (elem.mozRequestFullScreen) {
            elem.mozRequestFullScreen();
          } else if (elem.msRequestFullscreen) {
            elem.msRequestFullscreen();
          }
        } else {
          // Exit fullscreen
          if (document.exitFullscreen) {
            document.exitFullscreen();
          } else if (document.webkitExitFullscreen) {
            document.webkitExitFullscreen();
          } else if (document.mozCancelFullScreen) {
            document.mozCancelFullScreen();
          } else if (document.msExitFullscreen) {
            document.msExitFullscreen();
          }
        }
      });

      // Update fullscreen button text based on state
      function updateFullscreenButton() {
        if (
          document.fullscreenElement ||
          document.webkitFullscreenElement ||
          document.mozFullScreenElement ||
          document.msFullscreenElement
        ) {
          fullscreenBtn.textContent = "Exit Fullscreen";
        } else {
          fullscreenBtn.textContent = "Fullscreen";
        }
      }

      document.addEventListener("fullscreenchange", updateFullscreenButton);
      document.addEventListener(
        "webkitfullscreenchange",
        updateFullscreenButton,
      );
      document.addEventListener("mozfullscreenchange", updateFullscreenButton);
      document.addEventListener("MSFullscreenChange", updateFullscreenButton);
    </script>
  </body>
</html>
